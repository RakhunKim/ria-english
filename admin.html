<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RIA English — Admin</title>
<style>
/* ── 변수 ── */
:root {
  --bg:      #0F0F13;
  --surface: #1A1A22;
  --card:    #22222E;
  --border:  #2E2E3E;
  --accent:  #C4B5F4;
  --accent2: #F4A5B5;
  --mint:    #7DD3BC;
  --peach:   #F4A87C;
  --ink:     #F0EFF8;
  --ink2:    #A8A5C0;
  --muted:   #5A5870;
  --success: #7DD3BC;
  --error:   #F47C8A;
  --warn:    #F4C87C;

  --nav-w:   220px;
  --top-h:   52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; display: flex; height: 100vh; overflow: hidden; }

/* ── 사이드바 ── */
.sidebar {
  width: var(--nav-w); height: 100vh;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow-y: auto;
}
.sidebar-logo {
  padding: 18px 20px 14px;
  font-size: 16px; font-weight: 900; letter-spacing: .06em;
  color: var(--accent); border-bottom: 1px solid var(--border);
}
.sidebar-logo span { color: var(--accent2); }

.nav-section { padding: 12px 0 4px; }
.nav-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; padding: 0 16px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; cursor: pointer;
  font-size: 13px; font-weight: 600; color: var(--ink2);
  border-radius: 0; transition: all .15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--card); color: var(--ink); }
.nav-item.active { background: var(--card); color: var(--accent); border-left-color: var(--accent); }
.nav-icon { font-size: 15px; width: 18px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--accent); color: var(--bg); font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 20px; }
.nav-badge.warn { background: var(--warn); }
.nav-badge.ok { background: var(--mint); }

.sidebar-bottom { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border); }
.game-link {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; background: var(--accent);
  color: var(--bg); border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 800; justify-content: center;
  transition: opacity .2s;
}
.game-link:hover { opacity: .85; }

/* ── 메인 ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: var(--top-h); background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px;
  gap: 12px; flex-shrink: 0;
}
.topbar-title { font-size: 15px; font-weight: 800; color: var(--ink); }
.topbar-sub { font-size: 12px; color: var(--muted); }
.topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── 카드 ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 16px;
}
.card-title { font-size: 13px; font-weight: 800; color: var(--ink2); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 14px; }

/* ── 그리드 ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }

/* ── 스탯 카드 ── */
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.stat-n { font-size: 28px; font-weight: 900; color: var(--accent); line-height: 1; }
.stat-l { font-size: 11px; font-weight: 700; color: var(--muted); margin-top: 4px; }

/* ── 버튼 ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; transition: all .15s; }
.btn-primary { background: var(--accent); color: var(--bg); }
.btn-primary:hover { opacity: .85; }
.btn-secondary { background: var(--border); color: var(--ink); }
.btn-secondary:hover { background: var(--muted); }
.btn-success { background: var(--mint); color: var(--bg); }
.btn-danger { background: var(--error); color: white; }
.btn-ghost { background: transparent; color: var(--ink2); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-icon { padding: 7px; }

/* ── 입력 ── */
.input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--ink); font-size: 13px; font-family: inherit; width: 100%; transition: border-color .15s; }
.input:focus { outline: none; border-color: var(--accent); }
.input::placeholder { color: var(--muted); }
textarea.input { resize: vertical; min-height: 80px; line-height: 1.5; }
select.input { cursor: pointer; }
.label { font-size: 11px; font-weight: 700; color: var(--ink2); margin-bottom: 5px; display: block; }
.form-row { display: flex; gap: 12px; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 200px; }

/* ── 배지 ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-empty   { background: #2A2A3A; color: var(--muted); }
.badge-gen     { background: #2A2A1A; color: var(--warn); }
.badge-confirm { background: #1A2A2A; color: var(--mint); }
.badge-error   { background: #2A1A1A; color: var(--error); }

/* ── 진행바 ── */
.progress-wrap { background: var(--surface); border-radius: 20px; height: 6px; overflow: hidden; }
.progress-bar  { height: 100%; background: var(--accent); border-radius: 20px; transition: width .4s; }

/* ── 탭 ── */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab { padding: 8px 16px; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
.tab:hover { color: var(--ink); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── 토스트 ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--border);
  color: var(--ink); padding: 10px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 700;
  opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 9999;
  white-space: nowrap;
}
#toast.show { opacity: 1; }

/* ══════════════════════════════
   시나리오 탭
══════════════════════════════ */
.scenario-layout { display: flex; gap: 16px; height: calc(100vh - 52px - 48px); }
.scenario-tree { width: 200px; flex-shrink: 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow-y: auto; }
.scenario-tree-header { padding: 14px 14px 10px; font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.tree-day { padding: 8px 14px 4px; font-size: 11px; font-weight: 800; color: var(--accent); }
.tree-u { padding: 6px 14px 6px 24px; font-size: 12px; font-weight: 600; color: var(--ink2); cursor: pointer; border-radius: 6px; margin: 1px 6px; transition: all .15s; }
.tree-u:hover { background: var(--surface); color: var(--ink); }
.tree-u.active { background: var(--surface); color: var(--accent); }
.tree-u-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; background: var(--muted); vertical-align: middle; }
.tree-u-dot.ok { background: var(--mint); }
.tree-u-dot.partial { background: var(--warn); }

.scenario-detail { flex: 1; overflow-y: auto; }

/* Beat 카드 */
.beat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 12px; overflow: hidden;
}
.beat-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.beat-type { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 20px; letter-spacing: .05em; }
.bt-npc    { background: #2A1A3A; color: #C4A5F4; }
.bt-ria    { background: #1A2A3A; color: #A5C4F4; }
.bt-ctx    { background: #2A2A1A; color: var(--warn); }
.bt-target { background: #1A3A2A; color: var(--mint); }
.beat-id   { font-size: 11px; font-weight: 700; color: var(--muted); font-family: monospace; }
.beat-body { padding: 14px 16px; }
.beat-text { font-size: 14px; font-style: italic; color: var(--ink); margin-bottom: 10px; line-height: 1.5; }
.beat-ctx-text { font-size: 11px; color: var(--muted); margin-bottom: 10px; }

/* 이미지 슬롯 인라인 */
.beat-img-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
.beat-img-slot {
  width: 72px; height: 90px; border-radius: 8px;
  border: 1.5px dashed var(--border); background: var(--surface);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s; overflow: hidden; position: relative;
  flex-shrink: 0;
}
.beat-img-slot:hover { border-color: var(--accent); }
.beat-img-slot.confirmed { border-style: solid; border-color: var(--mint); }
.beat-img-slot img { width: 100%; height: 100%; object-fit: cover; }
.beat-img-slot-label { font-size: 9px; font-weight: 700; color: var(--muted); text-align: center; padding: 4px; line-height: 1.3; }
.beat-img-actions { display: flex; flex-direction: column; gap: 4px; }

/* CF 섹션 */
.cf-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.cf-title { font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 8px; }
.cf-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
.cf-pill { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.cf-c1 { background: #2A2A2A; color: #888; }
.cf-c2 { background: #2A2010; color: var(--peach); }
.cf-c3 { background: #102A2A; color: var(--mint); }

/* 큐/단어카드 */
.cue-display { background: var(--surface); border-radius: 8px; padding: 10px 12px; margin-top: 8px; }
.cue-text { font-size: 15px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.cue-words { display: flex; gap: 6px; flex-wrap: wrap; }
.cue-word { background: var(--border); color: var(--ink); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; }

/* ══════════════════════════════
   이미지 생성 탭
══════════════════════════════ */
.img-gen-layout { display: flex; gap: 16px; height: calc(100vh - 52px - 48px); }
.img-slot-list { width: 240px; flex-shrink: 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow-y: auto; }
.img-slot-list-header { padding: 14px 14px 10px; font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.slot-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .15s; display: flex; align-items: center; gap: 8px; }
.slot-item:hover { background: var(--surface); }
.slot-item.active { background: var(--surface); border-left: 3px solid var(--accent); }
.slot-thumb { width: 36px; height: 45px; border-radius: 4px; background: var(--surface); border: 1px solid var(--border); overflow: hidden; flex-shrink: 0; }
.slot-thumb img { width: 100%; height: 100%; object-fit: cover; }
.slot-info { flex: 1; min-width: 0; }
.slot-id { font-size: 10px; font-weight: 700; color: var(--muted); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.slot-name { font-size: 12px; font-weight: 600; color: var(--ink2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.img-gen-panel { flex: 1; overflow-y: auto; }

/* 생성 결과 그리드 */
.gen-results { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 14px; }
.gen-result {
  border-radius: 8px; overflow: hidden; border: 2px solid var(--border);
  cursor: pointer; transition: all .2s; aspect-ratio: 2/3; background: var(--surface);
  position: relative;
}
.gen-result:hover { border-color: var(--accent); }
.gen-result.selected { border-color: var(--mint); }
.gen-result img { width: 100%; height: 100%; object-fit: cover; }
.gen-result-check { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; background: var(--mint); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 12px; }
.gen-result.selected .gen-result-check { display: flex; }

/* ══════════════════════════════
   TTS 탭
══════════════════════════════ */
.tts-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.tts-id { font-size: 10px; font-weight: 700; color: var(--muted); font-family: monospace; min-width: 160px; }
.tts-text { font-size: 13px; font-style: italic; color: var(--ink2); flex: 1; }
.tts-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ══════════════════════════════
   BGM 탭
══════════════════════════════ */
.bgm-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.bgm-id { font-size: 11px; font-weight: 700; color: var(--accent); font-family: monospace; margin-bottom: 4px; }
.bgm-desc { font-size: 13px; color: var(--ink2); margin-bottom: 10px; }
.bgm-prompt { background: var(--card); border-radius: 6px; padding: 8px 10px; font-size: 12px; color: var(--muted); margin-bottom: 10px; font-family: monospace; line-height: 1.5; }

/* ══════════════════════════════
   테스트 탭
══════════════════════════════ */
.test-frame-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; max-width: 420px; margin: 0 auto; }
.test-topbar { background: var(--card); padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }

/* ══════════════════════════════
   설정 탭
══════════════════════════════ */
.api-key-row { display: flex; gap: 8px; align-items: center; }
.api-key-row .input { flex: 1; font-family: monospace; }

/* ══════════════════════════════
   모달
══════════════════════════════ */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.show { display: flex; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 900; color: var(--ink); margin-bottom: 16px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* 스크롤바 */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- 사이드바 -->
<nav class="sidebar">
  <div class="sidebar-logo">RIA <span>Admin</span></div>

  <div class="nav-section">
    <div class="nav-label">콘텐츠</div>

      <span class="nav-icon">📝</span> 시나리오

    </div>

</nav>

<!-- 메인 -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="page-title">시나리오</div>
      <div class="topbar-sub" id="page-sub">Day 1 · 5개 발화 · 37개 슬롯</div>
    </div>
    <div class="topbar-right" id="topbar-actions"></div>
  </div>

  <div class="content" id="content"></div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<!-- 이미지 생성 모달 -->
<div class="modal-bg" id="gen-modal">
  <div class="modal">
    <div class="modal-title" id="gen-modal-title">이미지 생성</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;" id="gen-slot-id"></div>

    <label class="label">프롬프트 (수정 가능)</label>
    <textarea class="input" id="gen-prompt" style="min-height:120px;"></textarea>

    <div style="display:flex;gap:10px;margin-top:10px;">
      <div style="flex:1;">
        <label class="label">생성 수량</label>
        <select class="input" id="gen-count">

          <option value="nai-diffusion-4-5-full">V4.5 Full (권장)</option>
          <option value="nai-diffusion-4-full">V4 Full</option>

      </div>

        <input type="checkbox" id="gen-removebg" checked>
        <span style="font-size:13px;font-weight:600;">🪄 remove.bg 배경 제거 (캐릭터 이미지)</span>

    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeGenModal()">취소</button>

      <button class="btn btn-success" id="confirm-gen-btn" onclick="confirmGenerate()" style="display:none;">✅ 확정</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// 환경 감지 — 로컬 vs Vercel
// ═══════════════════════════════════════
function getProxyUrl(type) {
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  if (isLocal) {
    // 로컬: node proxy-server.js 사용
    return type === 'nai'
      ? 'http://localhost:8080/proxy/nai'
      : 'http://localhost:8080/proxy/rmbg';
  }
  // Vercel 배포: /api/* 사용
  return type === 'nai' ? '/api/nai' : '/api/rmbg';
}

// ═══════════════════════════════════════
// IndexedDB
// ═══════════════════════════════════════
const DB_NAME = 'ria_db';
const DB_VER  = 2;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if(db) { resolve(db); return; }
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains('images'))
        d.createObjectStore('images', { keyPath: 'id' });
      if(!d.objectStoreNames.contains('audio'))
        d.createObjectStore('audio', { keyPath: 'id' });
      if(!d.objectStoreNames.contains('scenarios'))
        d.createObjectStore('scenarios', { keyPath: 'id' });
      if(!d.objectStoreNames.contains('slots'))
        d.createObjectStore('slots', { keyPath: 'id' });
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbSet(store, id, data) {
  const d = await openDB();
  return new Promise((resolve, reject) => {
    const tx = d.transaction(store, 'readwrite');
    tx.objectStore(store).put({ id, ...data });
    tx.oncomplete = resolve;
    tx.onerror    = e => reject(e.target.error);
  });
}

async function idbGet(store, id) {
  const d = await openDB();
  return new Promise((resolve) => {
    const req = d.transaction(store,'readonly').objectStore(store).get(id);
    req.onsuccess = e => resolve(e.target.result || null);
    req.onerror   = () => resolve(null);
  });
}

async function idbGetAll(store) {
  const d = await openDB();
  return new Promise((resolve) => {
    const req = d.transaction(store,'readonly').objectStore(store).getAll();
    req.onsuccess = e => resolve(e.target.result || []);
    req.onerror   = () => resolve([]);
  });
}

async function idbDelete(store, id) {
  const d = await openDB();
  return new Promise((resolve) => {
    const tx = d.transaction(store,'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete = resolve;
  });
}

let SCENARIO = null;
let SLOTS    = {};    // id → slot 객체
let IMG_CACHE = {};   // id → dataUrl

async function loadScenario() {
  // DB에서 시나리오 로드
  const saved = await idbGet('scenarios', 'day1');
  if(saved?.data) {
    SCENARIO = saved.data;
  } else {
    // 기본 Day 1 JSON 로드
    SCENARIO = getDay1Default();
    await idbSet('scenarios', 'day1', { data: SCENARIO });
  }
  await syncSlots();
}

async function syncSlots() {
  // 시나리오에서 슬롯 자동 추출
  const allSlots = await idbGetAll('slots');
  const slotMap = {};
  allSlots.forEach(s => slotMap[s.id] = s);

  const newSlotIds = new Set();

  // 이미지 슬롯 추출
  if(SCENARIO.image_slots) {
    for(const slot of SCENARIO.image_slots) {
      newSlotIds.add(slot.id);
      if(!slotMap[slot.id]) {
        await idbSet('slots', slot.id, { ...slot, status: 'empty', dataUrl: null });
      }
    }
  }

  // BGM 슬롯 추출
  if(SCENARIO.bgm_slots) {
    for(const slot of SCENARIO.bgm_slots) {
      newSlotIds.add(slot.id);
      if(!slotMap[slot.id]) {
        await idbSet('slots', slot.id, { ...slot, type:'bgm', status:'empty', dataUrl:null });
      }
    }
  }

  // TTS 슬롯 추출 (beat별 대사)
  if(SCENARIO.utterances) {
    for(const u of SCENARIO.utterances) {
      for(const beat of u.beats || []) {
        if(beat.tts && beat.text) {
          const sid = `tts_${beat.id}`;
          newSlotIds.add(sid);
          if(!slotMap[sid]) {
            await idbSet('slots', sid, { id: sid, type:'tts', text: beat.text, status:'empty', dataUrl:null });
          }
        }
      }
    }
  }

  // 전체 슬롯 메모리 로드
  const updatedSlots = await idbGetAll('slots');
  SLOTS = {};
  updatedSlots.forEach(s => SLOTS[s.id] = s);

  // 이미지 캐시 로드
  const imgs = await idbGetAll('images');
  IMG_CACHE = {};
  imgs.forEach(i => IMG_CACHE[i.id] = i.dataUrl);
}

async function saveSlot(slot) {
  await idbSet('slots', slot.id, slot);
  SLOTS[slot.id] = slot;
  if(slot.dataUrl) IMG_CACHE[slot.id] = slot.dataUrl;
}

  SCENARIO[key].lines.push('');
  selectU(key);
}

function removeMonologueLine(key, idx) {
  SCENARIO[key].lines.splice(idx, 1);
  selectU(key);
}

async function saveScenario() {
  await idbSet('scenarios', 'day1', { data: SCENARIO });
  await syncSlots();
  showToast('✅ 시나리오 저장됨');
  renderTree();
}

function exportScenario() {
  const blob = new Blob([JSON.stringify(SCENARIO, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ria-day1-scenario.json';
  a.click();
  showToast('📤 JSON 내보내기 완료');
}

function importScenario() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0];
    if(!file) return;
    const text = await file.text();
    try {
      SCENARIO = JSON.parse(text);
      await idbSet('scenarios', 'day1', { data: SCENARIO });
      await syncSlots();
      showToast('✅ JSON 불러오기 완료');
      renderScenario();
    } catch(err) {
      showToast('❌ JSON 파싱 오류');

  };
  input.click();
}

// ── U 추가
// ── 슬롯 자동 생성
async function autoCreateSlots(beat, uid) {
  const toCreate = [];

  // 이미지 슬롯
  if(beat.img) {
    toCreate.push({
      id: beat.img, type: beat.type === 'npc' ? 'character' : 'character',
      character: beat.type === 'npc' ? 'professor' : 'ria',
      removebg: true, status: 'empty',
      img_prompt: beat.img_prompt || {}
    });
  }

  // target beat → CF + reward 슬롯
  if(beat.type === 'target') {
    for(const cf of ['cf1','cf2','cf3']) {
      if(beat.cf?.[cf]?.img) {
        toCreate.push({
          id: beat.cf[cf].img, type:'character', character:'ria',
          removebg:true, status:'empty',
          img_prompt: beat.cf[cf].img_prompt || {}
        });
      }
    }
    if(beat.reward?.img) {
      toCreate.push({
        id: beat.reward.img, type:'character', character:'ria',
        removebg:true, status:'empty',
        img_prompt: beat.reward.img_prompt || {}
      });
    }
  }

  // TTS 슬롯
  if(beat.tts && beat.text) {
    toCreate.push({ id:`tts_${beat.id}`, type:'tts', text:beat.text, status:'empty' });
  }

  for(const slot of toCreate) {
    if(!SLOTS[slot.id]) {
      await idbSet('slots', slot.id, slot);
      SLOTS[slot.id] = slot;
    }
  }
}

// ── 슬롯 자동 삭제 (확정 안 된 것만)
async function autoDeleteSlots(beat) {
  const toDelete = [];
  if(beat.img) toDelete.push(beat.img);
  if(beat.type === 'target') {
    for(const cf of ['cf1','cf2','cf3']) {
      if(beat.cf?.[cf]?.img) toDelete.push(beat.cf[cf].img);
    }
    if(beat.reward?.img) toDelete.push(beat.reward.img);
  }
  toDelete.push(`tts_${beat.id}`);

  for(const id of toDelete) {
    const slot = SLOTS[id];
    if(slot && slot.status !== 'confirmed') {
      await idbDelete('slots', id);
      delete SLOTS[id];
      delete IMG_CACHE[id];
    } else if(slot?.status === 'confirmed') {
      showToast(`⚠️ ${id} — 확정된 이미지는 보관됨`);
    }
  }
}

// ── Beat 순서 이동
async function moveBeat(uid, bid, dir) {
  const u = SCENARIO.utterances?.find(u => u.id === uid);
  if(!u) return;
  const idx = u.beats.findIndex(b => b.id === bid);
  if(idx < 0) return;
  const newIdx = dir === 'up' ? idx-1 : idx+1;
  if(newIdx < 0 || newIdx >= u.beats.length) return;
  const tmp = u.beats[idx];
  u.beats[idx] = u.beats[newIdx];
  u.beats[newIdx] = tmp;
  await saveScenario();
  selectU(uid);
}

// ── 슬롯 자동 생성
async function autoCreateSlots(beat, uid) {
  // 이미지 슬롯
  if(beat.img) {
    const isChar = beat.type !== 'background';
    if(!SLOTS[beat.img]) {
      await idbSet('slots', beat.img, {
        id: beat.img, type: beat.type === 'npc' ? 'character' : 'character',
        character: beat.type === 'npc' ? 'professor' : 'ria',
        removebg: true, status: 'empty', dataUrl: null,
        img_prompt: beat.img_prompt
      });
      SLOTS[beat.img] = { id: beat.img, type:'character', status:'empty', dataUrl:null, img_prompt: beat.img_prompt };
    }
  }

  // target beat CF/RW 슬롯
  if(beat.type === 'target' && beat.cf) {
    for(const [cfKey, cf] of Object.entries(beat.cf)) {
      if(cf.img && !SLOTS[cf.img]) {
        await idbSet('slots', cf.img, { id:cf.img, type:'character', character:'ria', removebg:true, status:'empty', dataUrl:null, img_prompt:cf.img_prompt });
        SLOTS[cf.img] = { id:cf.img, type:'character', status:'empty', dataUrl:null };
      }
    }
    if(beat.reward?.img && !SLOTS[beat.reward.img]) {
      await idbSet('slots', beat.reward.img, { id:beat.reward.img, type:'character', character:'ria', removebg:true, status:'empty', dataUrl:null });
      SLOTS[beat.reward.img] = { id:beat.reward.img, type:'character', status:'empty', dataUrl:null };
    }
  }

  // TTS 슬롯
  if(beat.tts && beat.text) {
    const sid = `tts_${beat.id}`;
    if(!SLOTS[sid]) {
      await idbSet('slots', sid, { id:sid, type:'tts', text:beat.text, status:'empty', dataUrl:null });
      SLOTS[sid] = { id:sid, type:'tts', text:beat.text, status:'empty', dataUrl:null };
    }
  }
}

// ── 슬롯 삭제 (이미지 미확정 시)
async function autoDeleteSlots(beat) {
  const toDelete = [];
  if(beat.img) toDelete.push(beat.img);
  if(beat.type === 'target' && beat.cf) {
    Object.values(beat.cf).forEach(cf => { if(cf.img) toDelete.push(cf.img); });
    if(beat.reward?.img) toDelete.push(beat.reward.img);
  }
  toDelete.push(`tts_${beat.id}`);

  for(const id of toDelete) {
    const slot = SLOTS[id];
    if(slot?.status === 'confirmed') {
      showToast(`⚠️ ${id} — 확정된 이미지는 보관됨`);
    } else {
      await idbDelete('slots', id);
      delete SLOTS[id];
      delete IMG_CACHE[id];
    }
  }
}

function applySlotFilter() {
  const filter = document.getElementById('slot-filter')?.value || 'all';
  let slots = Object.values(SLOTS).filter(s => s.type === 'character' || s.type === 'background');
  if(filter === 'empty')      slots = slots.filter(s => !s.dataUrl && !IMG_CACHE[s.id]);
  else if(filter === 'uploaded')  slots = slots.filter(s => (s.dataUrl || IMG_CACHE[s.id]) && s.status !== 'confirmed');
  else if(filter === 'confirmed') slots = slots.filter(s => s.status === 'confirmed');
  else if(filter === 'character') slots = slots.filter(s => s.type === 'character');
  else if(filter === 'background')slots = slots.filter(s => s.type === 'background');
  renderSlotList(slots);
}

function renderSlotList(slots) {
  const el = document.getElementById('slot-list-content');
  if(!el) return;

  // Day/U별 그룹핑
  const groups = {};
  slots.forEach(s => {
    const parts = s.id.split('_');
    const group = parts.slice(0,2).join('_');
    if(!groups[group]) groups[group] = [];
    groups[group].push(s);
  });

  let html = '';
  for(const [group, gSlots] of Object.entries(groups)) {
    const gConf = gSlots.filter(s => s.status === 'confirmed').length;
    html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px 4px;">
      <span style="font-size:10px;font-weight:800;color:var(--accent);letter-spacing:.1em;">${group}</span>
      <span style="font-size:9px;color:var(--muted);">${gConf}/${gSlots.length}</span>
    </div>`;
    gSlots.forEach(s => {
      const imgUrl = IMG_CACHE[s.id] || s.dataUrl;
      const hasImg = !!imgUrl;
      const statusIcon = s.status === 'confirmed' ? '✅' : (hasImg ? '📸' : '⬜');
      const badgeClass = s.status === 'confirmed' ? 'badge-confirm' : (hasImg ? 'badge-gen' : 'badge-empty');
      html += `
        <div class="slot-item ${currentSlotId === s.id ? 'active' : ''}" onclick="selectSlot('${s.id}')">
          <div class="slot-thumb">
            ${imgUrl ? `<img src="${imgUrl}">` : ''}
          </div>
          <div class="slot-info">
            <div class="slot-id">${s.id.split('_').slice(2).join('_') || s.id}</div>
            <div class="slot-name" style="font-size:10px;color:var(--muted);">${s.type === 'background' ? '🌅 배경' : (s.character || 'ria')}</div>
          </div>
          <span class="badge ${badgeClass}" style="font-size:9px;padding:2px 5px;">${statusIcon}</span>
        </div>
      `;
    });
  }
  if(!html) html = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px;">슬롯 없음</div>`;
  el.innerHTML = html;
}

          </div>
        </div>

        <!-- 프롬프트 편집 -->
        <div style="flex:1;">
          ${isChar ? `
            <label class="label">기분 (mood)</label>
            <input class="input" id="slot-mood" value="${mood.replace(/"/g,'&quot;')}" placeholder="e.g. happy, warm, joyful," style="margin-bottom:8px;">
            <label class="label">포즈 (pose)</label>
            <input class="input" id="slot-pose" value="${pose.replace(/"/g,'&quot;')}" placeholder="e.g. slight smile, looking at viewer," style="margin-bottom:8px;">
            <button class="btn btn-ghost btn-sm" onclick="saveSlotPrompt('${id}')">💾 저장</button>
            <button class="btn btn-ghost btn-sm" style="margin-left:4px;" onclick="toggleFullPrompt()">전체 프롬프트 ▾</button>
          ` : `
            <label class="label">배경 프롬프트</label>
            <textarea class="input" id="slot-bg-prompt" style="min-height:80px;font-family:monospace;font-size:11px;">${slot.bg_prompt || ''}</textarea>
            <button class="btn btn-ghost btn-sm" style="margin-top:6px;" onclick="saveBgPrompt('${id}')">💾 저장</button>
          `}
          <div id="full-prompt-wrap" style="display:none;margin-top:10px;">
            <label class="label">전체 프롬프트 (수정 후 생성에 자동 반영)</label>
            <textarea class="input" id="slot-full-prompt" style="min-height:120px;font-family:monospace;font-size:11px;line-height:1.5;">${fullPrompt}</textarea>
          </div>
        </div>
      </div>

      <!-- 액션 버튼 -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border);">
        <button class="btn btn-primary" onclick="openGenModal('${id}','${slot.type||'character'}')">
          🎨 NAI 생성
        </button>
        ${imgUrl ? `
          ${isChar ? `<button class="btn btn-ghost" onclick="removeBg('${id}')">🪄 배경 제거</button>` : ''}
          <button class="btn btn-success" onclick="confirmSlot('${id}')">✅ 확정</button>
        ` : ''}
      </div>
    </div>
  `;

  // 슬롯 목록 업데이트
  const imgSlots = Object.values(SLOTS).filter(s => s.type === 'character' || s.type === 'background');
  renderSlotList(imgSlots);
}

function toggleFullPrompt() {
  const w = document.getElementById('full-prompt-wrap');
  if(!w) return;
  w.style.display = w.style.display === 'none' ? 'block' : 'none';
  // 현재 mood/pose 반영해서 프롬프트 갱신
  if(w.style.display === 'block') {
    const slot = SLOTS[currentSlotId];
    const mood = document.getElementById('slot-mood')?.value || slot?.img_prompt?.mood || '';
    const pose = document.getElementById('slot-pose')?.value || slot?.img_prompt?.pose || '';
    const tempSlot = { ...slot, img_prompt: { ...slot?.img_prompt, mood, pose } };
    const el = document.getElementById('slot-full-prompt');
    if(el) el.value = buildPrompt(tempSlot);
  }
}

async function saveSlotPrompt(id) {
  const slot = SLOTS[id];
  if(!slot) return;
  const mood = document.getElementById('slot-mood')?.value || '';
  const pose = document.getElementById('slot-pose')?.value || '';
  if(!slot.img_prompt) slot.img_prompt = {};
  slot.img_prompt.mood = mood;
  slot.img_prompt.pose = pose;
  await saveSlot(slot);
  // 전체 프롬프트 textarea도 갱신
  const fullEl = document.getElementById('slot-full-prompt');
  if(fullEl) fullEl.value = buildPrompt(slot);
  showToast(`✅ ${id} 프롬프트 저장됨`);
}

async function saveBgPrompt(id) {
  const slot = SLOTS[id];
  if(!slot) return;
  slot.bg_prompt = document.getElementById('slot-bg-prompt')?.value || '';
  await saveSlot(slot);
  showToast(`✅ ${id} 프롬프트 저장됨`);
}

function uploadSlotImage(id) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      const dataUrl = ev.target.result;
      const slot = SLOTS[id] || { id, type:'character', character:'ria', removebg:true };
      slot.dataUrl = dataUrl;
      slot.status  = 'empty'; // 업로드 후 확정은 수동
      await saveSlot(slot);
      await idbSet('images', id, { dataUrl });
      IMG_CACHE[id] = dataUrl;
      showToast(`✅ ${id} 업로드됨 — 확정 버튼 눌러주세요`);
      selectSlot(id);
      updateBadges();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function buildPrompt(slot) {
  if(!slot) return '슬롯 정보 없음';
  if(slot.type === 'background') {
    return slot.bg_prompt || getCharPrompt('background', slot);
  }
  const char = slot.character || 'ria';
  const base = getCharPrompt(char, slot);
  return base;
}

function getCharPrompt(char, slot) {
  const bases = JSON.parse(localStorage.getItem('ria_char_prompts') || '{}');
  if(char === 'ria') {
    const base = bases.ria_base || RIA_BASE_PROMPT;
    const mood = slot?.img_prompt?.mood || '';
    const pose = slot?.img_prompt?.pose || '';
    return `${base}\n[기분] ${mood}\n[포즈] ${pose}`;
  }
  if(char === 'professor') {
    return bases.professor_base || PROFESSOR_BASE_PROMPT;
  }
  return bases[char] || '';
}

// 기본 프롬프트
const RIA_BASE_PROMPT = `game cg style, visual novel cg, soft shading, vibrant color, clean illustration, smooth coloring, upper body, transparent background
[신체] 1girl, korean woman, age 21, pale skin, small face, beautiful face, fair skin, natural skin tone, rosy cheeks, natural makeup, defined eyebrows, sharp almond eyes, dark amber eyes, warm brown eyes, slender figure, slim waist, slightly full chest, balanced proportions,
[헤어] jet black hair, dark black hair, shoulder length hair, loose hair, hair down, no hair tie, sleek, loose strands framing face,
[의상] pure white polo shirt, button collar, short sleeve, blue denim jeans,`;

const PROFESSOR_BASE_PROMPT = `game cg style, visual novel cg, soft shading, vibrant color, clean illustration, upper body, transparent background
1man, korean male professor, age 50s, silver grey hair, glasses, kind but authoritative expression, slim build, formal shirt, dark slacks,`;

// 이미지 생성 모달
function openGenModal(slotId, type) {
  currentSlotId = slotId;
  const slot = SLOTS[slotId] || { id: slotId, type: type || 'character', character: 'ria' };

  // 패널에서 수정 중인 mood/pose 값 반영
  const liveMood = document.getElementById('slot-mood')?.value;
  const livePose = document.getElementById('slot-pose')?.value;
  const liveFullPrompt = document.getElementById('slot-full-prompt')?.value;

  let prompt;
  if(liveFullPrompt && document.getElementById('full-prompt-wrap')?.style.display !== 'none') {
    // 전체 프롬프트 textarea가 열려있으면 그대로 사용
    prompt = liveFullPrompt;
  } else {
    // mood/pose 패널 값 우선 반영
    const tempSlot = {
      ...slot,
      img_prompt: {
        ...slot.img_prompt,
        mood: liveMood !== undefined ? liveMood : (slot.img_prompt?.mood || ''),
        pose: livePose !== undefined ? livePose : (slot.img_prompt?.pose || ''),
      }
    };
    prompt = buildPrompt(tempSlot);
  }

  document.getElementById('gen-modal-title').textContent = `이미지 생성 — ${slotId}`;
  document.getElementById('gen-slot-id').textContent = slotId;
  document.getElementById('gen-prompt').value = prompt;
  document.getElementById('gen-results').innerHTML = '';
  document.getElementById('gen-progress').style.display = 'none';
  document.getElementById('confirm-gen-btn').style.display = 'none';
  document.getElementById('gen-btn').style.display = '';
  document.getElementById('gen-removebg-row').style.display = type !== 'background' ? 'block' : 'none';
  document.getElementById('gen-removebg').checked = type !== 'background';

  selectedGenIdx = null;
  genResults = [];

  document.getElementById('gen-modal').classList.add('show');
}

function closeGenModal() {
  document.getElementById('gen-modal').classList.remove('show');
}

async function startGenerate() {
  const apiKey = localStorage.getItem('ria_nai_key');
  if(!apiKey) { showToast('❌ NAI API 키가 없어요 (설정 탭)'); return; }

  const model = document.getElementById('gen-model')?.value || 'nai-diffusion-4-5-full';
  const count  = parseInt(document.getElementById('gen-count').value);

  document.getElementById('gen-btn').style.display = 'none';
  document.getElementById('gen-progress').style.display = 'block';
  document.getElementById('gen-results').innerHTML = '';
  genResults = [];

  const progressBar  = document.getElementById('gen-progress-bar');
  const progressText = document.getElementById('gen-progress-text');

  for(let i = 0; i < count; i++) {
    progressText.textContent = `생성 중... (${i+1}/${count})`;
    progressBar.style.width = ((i+1)/count*100) + '%';

    try {
      const prompt = document.getElementById('gen-prompt').value;
      const imgB64 = await callNAI(prompt, apiKey, model);
      genResults.push(imgB64);
      renderGenResults();
    } catch(e) {
      showToast('❌ NAI 오류: ' + e.message);
    }
  }

  progressText.textContent = `✅ ${genResults.length}장 생성 완료`;
  document.getElementById('confirm-gen-btn').style.display = '';
}

async function callNAI(prompt, apiKey, model = 'nai-diffusion-4-5-full') {
  const isV4 = model.includes('nai-diffusion-4');
  const seed = Math.floor(Math.random() * 4294967295);
  const negPrompt = 'sketch, pencil, rough lines, monochrome, greyscale, bad anatomy, lowres, blurry, watermark, deformed proportions';

  const params = {
    params_version: isV4 ? 3 : 1,
    width: 832,
    height: 1216,
    n_samples: 1,
    steps: 28,
    scale: 7,
    sampler: isV4 ? 'k_dpmpp_2m' : 'k_euler_ancestral',
    seed: seed,
    noise_schedule: isV4 ? 'exponential' : 'karras',
    legacy: false,
    legacy_v3_extend: false,
    ucPreset: 0,
    qualityToggle: isV4,
    autoSmea: false,
    dynamic_thresholding: false,
    controlnet_strength: 1,
    add_original_image: true,
    cfg_rescale: 0,
    use_coords: false,
    legacy_uc: false,
    normalize_reference_strength_multiple: true,
    inpaintImg2ImgStrength: 1,
    negative_prompt: negPrompt,
  };

  if (isV4) {
    params.v4_prompt = {
      caption: { base_caption: prompt, char_captions: [] }
    };
    params.v4_negative_prompt = {
      caption: { base_caption: negPrompt, char_captions: [] },
      legacy_uc: false
    };
  }

  const body = {
    input: prompt,
    model: model,
    action: 'generate',
    parameters: params,
  };

  const res = await fetch(getProxyUrl('nai'), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
    },
    body: JSON.stringify(body)
  });

  if(!res.ok) {
    const errText = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status} — ${errText.slice(0,100)}`);
  }

  const buf = await res.arrayBuffer();
  const arr = new Uint8Array(buf);

  // 디버그: 첫 100바이트 출력
  console.log('NAI 응답 첫 100바이트:', Array.from(arr.slice(0,100)));
  console.log('NAI 응답 크기:', arr.length);
  console.log('NAI Content-Type:', res.headers.get('content-type'));

  // ZIP 파싱 먼저 시도
  if(arr[0]===0x50 && arr[1]===0x4B) {
    console.log('ZIP 형식 감지');
    for(let i = 0; i < arr.length - 30; i++) {
      if(arr[i]===0x50 && arr[i+1]===0x4B && arr[i+2]===0x03 && arr[i+3]===0x04) {
        const fnLen    = arr[i+26] | (arr[i+27]<<8);
        const exLen    = arr[i+28] | (arr[i+29]<<8);
        const compSize = arr[i+18] | (arr[i+19]<<8) | (arr[i+20]<<16) | (arr[i+21]<<24);
        const dataStart = i + 30 + fnLen + exLen;
        const dataEnd   = dataStart + compSize;
        if(dataEnd > arr.length) continue;
        const fileData = arr.slice(dataStart, dataEnd);
        if(fileData[0]===137 && fileData[1]===80) {
          let binary = '';
          for(let j=0;j<fileData.length;j+=8192)
            binary += String.fromCharCode(...fileData.slice(j,j+8192));
          return btoa(binary);
        }
      }
    }
  }

  // PNG 직접 검색
  const pngSig = [137,80,78,71,13,10,26,10];
  for(let i = 0; i < arr.length - 8; i++) {
    if(pngSig.every((b,j) => arr[i+j]===b)) {
      console.log('PNG 발견 위치:', i);
      const iend = [73,69,78,68,174,66,96,130];
      let endIdx = arr.length;
      for(let j = i; j < arr.length - 8; j++) {
        if(iend.every((b,k) => arr[j+k]===b)) { endIdx = j+8; break; }
      }
      const pngData = arr.slice(i, endIdx);
      let binary = '';
      for(let j=0;j<pngData.length;j+=8192)
        binary += String.fromCharCode(...pngData.slice(j,j+8192));
      return btoa(binary);
    }
  }

  // 텍스트로 읽어보기
  const textDecoder = new TextDecoder('utf-8', {fatal:false});
  const text = textDecoder.decode(arr.slice(0, 200));
  console.log('텍스트로 읽기:', text);

  throw new Error(`PNG 이미지를 찾을 수 없어요 (크기: ${arr.length})`);
}

function renderGenResults() {
  const el = document.getElementById('gen-results');
  el.innerHTML = genResults.map((b64, i) => `
    <div class="gen-result ${selectedGenIdx === i ? 'selected' : ''}" onclick="selectGenResult(${i})">
      <img src="data:image/png;base64,${b64}">
      <div class="gen-result-check">✓</div>
    </div>
  `).join('');
}

function selectGenResult(idx) {
  selectedGenIdx = idx;
  renderGenResults();
}

async function confirmGenerate() {
  if(selectedGenIdx === null && genResults.length === 1) selectedGenIdx = 0;
  if(selectedGenIdx === null) { showToast('이미지를 선택해주세요'); return; }

  const b64 = genResults[selectedGenIdx];
  let dataUrl = `data:image/png;base64,${b64}`;

  // remove.bg 처리
  if(document.getElementById('gen-removebg').checked) {
    const rmbgKey = localStorage.getItem('ria_rmbg_key');
    if(rmbgKey) {
      showToast('🪄 배경 제거 중...');
      try {
        dataUrl = await removeBackground(dataUrl, rmbgKey);
      } catch(e) {
        showToast('⚠️ 배경 제거 실패 — 원본 저장');
      }
    }
  }

  // 저장
  const slot = SLOTS[currentSlotId] || { id: currentSlotId };
  slot.dataUrl = dataUrl;
  slot.status  = 'confirmed';
  await saveSlot(slot);
  await idbSet('images', currentSlotId, { dataUrl });

  closeGenModal();
  showToast(`✅ ${currentSlotId} 저장됨`);

  // UI 업데이트
  if(currentSlotId) selectSlot(currentSlotId);
  updateBadges();
}

async function removeBackground(dataUrl, apiKey) {
  // base64 → blob
  const res  = await fetch(dataUrl);
  const blob = await res.blob();
  const form = new FormData();
  form.append('image_file', blob, 'image.png');
  form.append('size', 'auto');

  const r = await fetch(getProxyUrl('rmbg'), {
    method: 'POST',
    headers: { 'X-Api-Key': apiKey },
    body: form,
  });

  if(!r.ok) throw new Error(`remove.bg HTTP ${r.status}`);
  const buf = await r.arrayBuffer();
  const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
  return `data:image/png;base64,${b64}`;
}

async function removeBg(slotId) {
  const rmbgKey = localStorage.getItem('ria_rmbg_key');
  if(!rmbgKey) { showToast('❌ remove.bg API 키가 없어요 (설정 탭)'); return; }
  const slot = SLOTS[slotId];
  if(!slot?.dataUrl) { showToast('이미지가 없어요'); return; }
  showToast('🪄 배경 제거 중...');
  try {
    const newUrl = await removeBackground(slot.dataUrl, rmbgKey);
    slot.dataUrl = newUrl;
    await saveSlot(slot);
    await idbSet('images', slotId, { dataUrl: newUrl });
    showToast('✅ 배경 제거 완료');
    selectSlot(slotId);
  } catch(e) {
    showToast('❌ ' + e.message);
  }
}

async function confirmSlot(slotId) {
  const slot = SLOTS[slotId];
  if(!slot) return;
  slot.status = 'confirmed';
  await saveSlot(slot);
  showToast(`✅ ${slotId} 확정됨`);
  selectSlot(slotId);
  updateBadges();
}

async function resetSlot(slotId) {
  if(!confirm('이미지를 초기화할까요?')) return;
  const slot = SLOTS[slotId];
  if(!slot) return;
  slot.status = 'empty'; slot.dataUrl = null;
  delete IMG_CACHE[slotId];
  await saveSlot(slot);
  await idbDelete('images', slotId);
  showToast('🗑 초기화됨');
  selectSlot(slotId);
  updateBadges();
}

function downloadSlot(slotId) {
  const url = IMG_CACHE[slotId];
  if(!url) return;
  const a = document.createElement('a');
  a.href = url; a.download = `${slotId}.png`; a.click();
}

async function generateAllEmpty() {
  const apiKey = localStorage.getItem('ria_nai_key');
  if(!apiKey) { showToast('❌ NAI API 키가 없어요 (설정 탭)'); return; }

  const emptySlots = Object.values(SLOTS).filter(
    s => (s.type === 'character' || s.type === 'background') && s.status !== 'confirmed'
  );

  if(emptySlots.length === 0) { showToast('✅ 생성할 슬롯이 없어요 (모두 확정됨)'); return; }

  if(!confirm(`미생성 슬롯 ${emptySlots.length}개를 순서대로 생성합니다.\nNAI API 크레딧이 충분한지 확인하세요.`)) return;

  // 진행 오버레이 생성
  const overlay = document.createElement('div');
  overlay.id = 'batch-overlay';
  overlay.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  `;
  overlay.innerHTML = `
    <div style="font-size:18px;font-weight:800;color:var(--ink);">🎨 전체 생성 중</div>
    <div id="batch-status" style="font-size:14px;color:var(--muted);min-width:320px;text-align:center;">준비 중...</div>
    <div style="width:320px;background:var(--surface);border-radius:20px;height:8px;overflow:hidden;">
      <div id="batch-bar" style="height:100%;background:var(--accent);border-radius:20px;transition:width .4s;width:0%"></div>
    </div>
    <div id="batch-count" style="font-size:12px;color:var(--muted);">0 / ${emptySlots.length}</div>
    <button class="btn btn-ghost btn-sm" onclick="window._batchStop=true">⏹ 중단</button>
  `;
  document.body.appendChild(overlay);
  window._batchStop = false;

  const model  = 'nai-diffusion-4-5-full';
  const rmbgKey = localStorage.getItem('ria_rmbg_key');
  let done = 0, failed = 0;

  for(const slot of emptySlots) {
    if(window._batchStop) break;

    document.getElementById('batch-status').textContent = `생성 중: ${slot.id}`;
    document.getElementById('batch-count').textContent = `${done} / ${emptySlots.length} (실패: ${failed})`;

    try {
      const prompt = buildPrompt(slot);
      const imgB64 = await callNAI(prompt, apiKey, model);
      let dataUrl = `data:image/png;base64,${imgB64}`;

      // 캐릭터 슬롯 + remove.bg 키 있으면 자동 배경 제거
      if(slot.type === 'character' && slot.removebg && rmbgKey) {
        try {
          dataUrl = await removeBackground(dataUrl, rmbgKey);
        } catch(e) { /* 실패해도 원본 저장 */ }
      }

      slot.dataUrl = dataUrl;
      slot.status  = 'empty'; // 자동 확정 안 함 — 확인 후 수동 확정
      await saveSlot(slot);
      await idbSet('images', slot.id, { dataUrl });
      IMG_CACHE[slot.id] = dataUrl;
      done++;
    } catch(e) {
      failed++;
      console.error(`${slot.id} 실패:`, e);
    }

    document.getElementById('batch-bar').style.width = ((done + failed) / emptySlots.length * 100) + '%';
    await new Promise(r => setTimeout(r, 800)); // NAI rate limit 대비
  }

  overlay.remove();
  updateBadges();
  renderImage();
  showToast(`✅ 완료 — ${done}개 생성, ${failed}개 실패`);
}

async function generateBeatTTS(beatId, text) {
  const apiKey = localStorage.getItem('ria_gemini_key');
  if(!apiKey) { showToast('❌ Gemini API 키가 없어요 (설정 탭)'); return; }
  const voice = document.getElementById('tts-voice')?.value || 'Zephyr';
  const slotId = `tts_${beatId}`;

  showToast(`🎤 생성 중...`);
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent`,
      {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify({
          contents: [{ parts: [{ text }] }],
          generationConfig: {
            responseModalities: ['AUDIO'],
            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
          }
        })
      }
    );
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const audioPart = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
    if(!audioPart?.inlineData?.data) throw new Error('오디오 없음');
    const dataUrl = `data:audio/mp3;base64,${audioPart.inlineData.data}`;

    const slot = SLOTS[slotId] || { id: slotId, type:'tts', text };
    slot.dataUrl = dataUrl; slot.status = 'confirmed';
    await saveSlot(slot);
    await idbSet('audio', slotId, { dataUrl });
    showToast(`✅ ${slotId} 생성 완료`);
    renderTTS();
  } catch(e) {
    showToast('❌ ' + e.message);
  }
}

async function generateAllTTS() {
  const ttsSlots = Object.values(SLOTS).filter(s => s.type === 'tts' && s.status !== 'confirmed');
  for(const s of ttsSlots) {
    await generateBeatTTS(s.id.replace('tts_',''), s.text || '');
    await new Promise(r => setTimeout(r, 500));
  }
  showToast('✅ 전체 음성 생성 완료');
}

let _currentAudio = null;
function playAudio(slotId) {
  const url = SLOTS[slotId]?.dataUrl || IMG_CACHE[slotId];
  if(!url) return;
  if(_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  _currentAudio = new Audio(url);
  _currentAudio.play();
  showToast(`▶ ${slotId}`);
}

function uploadBGM(slotId) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'audio/*';
  input.onchange = async e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      const slot = SLOTS[slotId] || { id: slotId, type:'bgm' };
      slot.dataUrl = ev.target.result; slot.status = 'confirmed';
      await saveSlot(slot);
      await idbSet('audio', slotId, { dataUrl: ev.target.result });
      showToast(`✅ ${slotId} 업로드됨`);
      renderBGM();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function uploadSFX(id) { uploadBGM(id); }

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => showToast('📋 복사됨'));

async function clearImageData() {
  if(!confirm('이미지 데이터를 모두 삭제할까요?')) return;
  const d = await openDB();
  const tx = d.transaction('images','readwrite');
  tx.objectStore('images').clear();
  await new Promise(r => tx.oncomplete = r);
  IMG_CACHE = {};
  const slotVals = Object.values(SLOTS);
  for(const s of slotVals) {
    if(s.type === 'character' || s.type === 'background') {
      s.status = 'empty'; s.dataUrl = null;
      await saveSlot(s);
    }
  }
  showToast('✅ 이미지 데이터 초기화됨');
}

async function clearAll() {
  if(!confirm('⚠️ 모든 데이터를 초기화합니다.\n정말 진행할까요?')) return;
  if(db) { db.close(); db = null; }
  await new Promise((res,rej) => {
    const req = indexedDB.deleteDatabase('ria_db');
    req.onsuccess = res; req.onerror = rej;
  });
  localStorage.clear();
  showToast('✅ 전체 초기화됨 — 새로고침');
  setTimeout(() => location.reload(), 1200);
}
